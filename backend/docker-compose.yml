version: '3.8'

# ============================================================================
# Biotech Lead Generator - Development Environment
# Complete setup with all services
# ============================================================================

services:
  # ============================================================================
  # FastAPI Application
  # ============================================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: biotech_api
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=Biotech Lead Generator API
      - DEBUG=True
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@db:5432/biotech_leads}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-here}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - PUBMED_EMAIL=${PUBMED_EMAIL}
      - SENTRY_DSN=${SENTRY_DSN}
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - biotech_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================================================
  # PostgreSQL Database
  # ============================================================================
  db:
    image: postgres:15-alpine
    container_name: biotech_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=biotech_leads
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - biotech_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # Redis Cache & Message Broker
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: biotech_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - biotech_network
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # Celery Worker (Background Jobs)
  # ============================================================================
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: biotech_worker
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@db:5432/biotech_leads}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-here}
      - RESEND_API_KEY=${RESEND_API_KEY}
    volumes:
      - ./app:/app/app
    depends_on:
      - db
      - redis
    networks:
      - biotech_network
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4
    restart: unless-stopped

  # ============================================================================
  # Celery Beat (Scheduler)
  # ============================================================================
  beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: biotech_beat
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@db:5432/biotech_leads}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-here}
    volumes:
      - ./app:/app/app
    depends_on:
      - db
      - redis
    networks:
      - biotech_network
    command: celery -A app.workers.celery_app beat --loglevel=info
    restart: unless-stopped

  # ============================================================================
  # Flower (Celery Monitoring)
  # ============================================================================
  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: biotech_flower
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
    depends_on:
      - redis
      - worker
    networks:
      - biotech_network
    command: celery -A app.workers.celery_app flower --port=5555
    restart: unless-stopped

  # ============================================================================
  # Adminer (Database Management)
  # ============================================================================
  adminer:
    image: adminer:latest
    container_name: biotech_adminer
    ports:
      - "8080:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=db
    depends_on:
      - db
    networks:
      - biotech_network
    restart: unless-stopped

# ============================================================================
# Networks
# ============================================================================
networks:
  biotech_network:
    driver: bridge

# ============================================================================
# Volumes
# ============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local