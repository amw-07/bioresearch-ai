services:
  - type: web
    name: bioresearch-ai-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health/live
    envVars:
      - key: RENDER
        value: "1"
      - key: SEED_ON_STARTUP
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: MIGRATION_DATABASE_URL
        sync: false
      - key: DATABASE_CONNECT_TIMEOUT
        value: "30"
      - key: DB_READY_MAX_WAIT_SECONDS
        value: "60"
      - key: DB_READY_POLL_INTERVAL
        value: "2"
      - key: REDIS_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: "gemini-3-flash-preview"
      - key: SECRET_KEY
        sync: false
      - key: PUBMED_EMAIL
        sync: false
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: "INFO"
      - key: FRONTEND_URL
        value: "https://bioresearch-ai.netlify.app"
      - key: FIRST_SUPERUSER_EMAIL
        sync: false
      - key: FIRST_SUPERUSER_PASSWORD
        sync: false
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: CHROMADB_PATH
        value: "/app/chromadb_store"
