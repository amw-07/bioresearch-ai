# render.yaml — place at the repo root in Week 4
services:
  - type: web
    name: bioresearch-ai-backend
    runtime: python
    buildCommand: "pip install uv && uv sync --frozen --no-dev"
    startCommand: "uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        sync: false        # set manually in Render dashboard
      - key: REDIS_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false        # optional — Component 3 degrades gracefully without it
      - key: SECRET_KEY
        sync: false
      - key: PUBMED_EMAIL
        sync: false
      - key: DEBUG
        value: false
      - key: LOG_LEVEL
        value: INFO